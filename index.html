<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;500;600;700;800;900&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet" />
    <title>一刀入魂 IKKON</title>
  </head>
  <body>
    <!-- Loading splash — magical sigil, removed once React mounts -->
    <div id="app-loading">
      <style>
        #app-loading {
          position: fixed;
          inset: 0;
          background:
            radial-gradient(ellipse at center, #15103a 0%, #0e0a26 50%, #07041a 100%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 28px;
          z-index: 9999;
          transition: opacity 0.5s ease;
          overflow: hidden;
        }
        #app-loading.fade-out {
          opacity: 0;
          pointer-events: none;
        }
        #app-loading::before {
          content: '';
          position: absolute;
          inset: 0;
          background-image:
            radial-gradient(circle at 20% 30%, rgba(240, 180, 41, 0.08), transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(124, 109, 240, 0.1), transparent 40%);
          pointer-events: none;
        }
        .loading-sigil {
          width: 96px;
          height: 96px;
          position: relative;
        }
        .loading-sigil svg {
          width: 100%;
          height: 100%;
          animation: sigil-spin 6s linear infinite;
        }
        .loading-sigil::after {
          content: '';
          position: absolute;
          inset: 25%;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(240, 180, 41, 0.6), transparent 65%);
          animation: sigil-pulse 1.6s ease-in-out infinite;
        }
        @keyframes sigil-spin {
          from { transform: rotate(0deg); }
          to   { transform: rotate(360deg); }
        }
        @keyframes sigil-pulse {
          0%, 100% { opacity: 0.4; transform: scale(0.8); }
          50%      { opacity: 1;   transform: scale(1.15); }
        }
        .loading-title {
          font-family: 'Cinzel', 'Noto Serif TC', serif;
          font-size: 22px;
          font-weight: 600;
          color: #f0b429;
          letter-spacing: 0.32em;
          text-transform: uppercase;
          padding-left: 0.32em;
          text-shadow: 0 0 24px rgba(240, 180, 41, 0.5);
        }
        .loading-cn {
          font-family: 'Noto Serif TC', serif;
          font-size: 28px;
          font-weight: 700;
          color: #f5f0e8;
          letter-spacing: 0.6em;
          padding-left: 0.6em;
          margin-top: -8px;
        }
        .loading-sub {
          font-family: 'Cinzel', sans-serif;
          font-size: 11px;
          letter-spacing: 0.4em;
          color: #b8b0c8;
          text-transform: uppercase;
          padding-left: 0.4em;
        }
      </style>
      <div class="loading-sigil">
        <svg viewBox="0 0 100 100" fill="none" stroke="#f0b429" stroke-width="0.8">
          <circle cx="50" cy="50" r="46" opacity="0.6"/>
          <circle cx="50" cy="50" r="36" opacity="0.4"/>
          <circle cx="50" cy="50" r="26" opacity="0.7"/>
          <!-- 6-pointed star -->
          <path d="M50 8 L50 92 M14 29 L86 71 M14 71 L86 29" opacity="0.55"/>
          <!-- Outer marks -->
          <circle cx="50" cy="4"  r="1.5" fill="#ffd152" stroke="none"/>
          <circle cx="92" cy="50" r="1.5" fill="#ffd152" stroke="none"/>
          <circle cx="50" cy="96" r="1.5" fill="#ffd152" stroke="none"/>
          <circle cx="8"  cy="50" r="1.5" fill="#ffd152" stroke="none"/>
          <circle cx="79" cy="21" r="1"   fill="#7c6df0" stroke="none"/>
          <circle cx="79" cy="79" r="1"   fill="#7c6df0" stroke="none"/>
          <circle cx="21" cy="79" r="1"   fill="#7c6df0" stroke="none"/>
          <circle cx="21" cy="21" r="1"   fill="#7c6df0" stroke="none"/>
        </svg>
      </div>
      <div class="loading-title">IKKON</div>
      <div class="loading-cn">一刀入魂</div>
      <div class="loading-sub">Summoning · 召喚中</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
