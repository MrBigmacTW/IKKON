<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet" />
    <title>一刀入魂 IKKON</title>
  </head>
  <body>
    <!-- Loading splash — removed once React mounts -->
    <div id="app-loading">
      <style>
        #app-loading {
          position: fixed;
          inset: 0;
          background: #0a0a0a;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          z-index: 9999;
          transition: opacity 0.4s ease;
        }
        #app-loading.fade-out {
          opacity: 0;
          pointer-events: none;
        }
        .loading-title {
          font-family: 'Noto Serif TC', serif;
          font-size: 28px;
          font-weight: 900;
          color: #e8d5a3;
          letter-spacing: 0.12em;
        }
        .loading-sub {
          font-family: 'Bebas Neue', sans-serif;
          font-size: 14px;
          letter-spacing: 0.3em;
          color: #c8102e;
        }
        .loading-blade {
          width: 2px;
          height: 60px;
          background: linear-gradient(to bottom, transparent, #c8102e, #e8d5a3);
          animation: blade-drop 1.2s ease-in-out infinite;
          transform-origin: top center;
        }
        @keyframes blade-drop {
          0%   { transform: scaleY(0) translateY(0); opacity: 0; }
          40%  { transform: scaleY(1) translateY(0); opacity: 1; }
          70%  { transform: scaleY(1) translateY(4px); opacity: 1; }
          100% { transform: scaleY(0) translateY(8px); opacity: 0; }
        }
      </style>
      <div class="loading-blade"></div>
      <div class="loading-title">一刀入魂</div>
      <div class="loading-sub">IKKON · LOADING</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
